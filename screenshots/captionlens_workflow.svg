<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">CaptionLens Workflow</title>
  <desc id="desc">Transformer-based image captioning workflow for CaptionLens.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#111827"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#0f172a" flood-opacity=".14"/>
    </filter>
    <style>
      text{font-family:Arial,"Microsoft YaHei",sans-serif;fill:#111827}
      .h1{font-size:40px;font-weight:800}.h2{font-size:24px;font-weight:700}.step{font-size:20px;font-weight:800}.cn{font-size:15px}.small{font-size:15px}.tiny{font-size:13px;fill:#475569}
      .card{fill:#fff;stroke:#cbd5e1;stroke-width:1.5;rx:14;filter:url(#shadow)}
      .blue{fill:#eff6ff;stroke:#2563eb}.green{fill:#ecfdf5;stroke:#16a34a}.amber{fill:#fffbeb;stroke:#f59e0b}
      .arrow{stroke:#111827;stroke-width:4;marker-end:url(#arrow);fill:none}.dash{stroke:#475569;stroke-width:2;stroke-dasharray:8 6;marker-end:url(#arrow);fill:none}
      .chip{fill:#f8fafc;stroke:#94a3b8;rx:5}.token{fill:#dbeafe;stroke:#2563eb}.region{fill:#dcfce7;stroke:#16a34a}
    </style>
  </defs>

  <rect width="1600" height="900" fill="#fff"/>
  <text x="800" y="50" text-anchor="middle" class="h1">CaptionLens: Workflow of Transformer-Based Image Captioning</text>
  <text x="800" y="90" text-anchor="middle" class="h2">基于注意力机制的图像语义描述生成系统工作流程</text>

  <g transform="translate(30,130)">
    <text x="90" y="0" text-anchor="middle" class="step">1. Input Image</text>
    <text x="90" y="26" text-anchor="middle" class="cn">输入图像</text>
    <rect x="0" y="60" width="190" height="160" class="card"/>
    <rect x="18" y="82" width="154" height="105" fill="#bfdbfe" stroke="#1e3a8a" rx="8"/>
    <path d="M30 165 L118 138 L162 150 L162 160 L112 158 L76 182 L48 182 Z" fill="#2563eb"/>
    <path d="M84 148 L126 104 L144 108 L112 157 Z M102 160 L62 192 L82 192 L128 164 Z" fill="#ef4444"/>
  </g>

  <g transform="translate(272,130)">
    <text x="92" y="0" text-anchor="middle" class="step">2. Preprocessing</text>
    <text x="92" y="26" text-anchor="middle" class="cn">预处理</text>
    <rect x="0" y="60" width="184" height="160" class="card"/>
    <rect x="34" y="88" width="46" height="46" fill="none" stroke="#111827" stroke-width="4" stroke-dasharray="7 5"/>
    <path d="M47 121 L93 75" stroke="#111827" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="106" y="112" class="small">Resize 224 x 224</text>
    <path d="M36 188 L36 150 L46 150 L46 188 Z M52 188 L52 170 L62 170 L62 188 Z M68 188 L68 134 L78 134 L78 188 Z M84 188 L84 160 L94 160 L94 188 Z" fill="#111827"/>
    <text x="106" y="178" class="small">Normalize</text>
    <text x="106" y="199" class="tiny">(Mean, Std)</text>
  </g>

  <g transform="translate(508,130)">
    <text x="100" y="0" text-anchor="middle" class="step">3. CNN Encoder</text>
    <text x="100" y="26" text-anchor="middle" class="cn">ResNet50 图像编码器</text>
    <rect x="0" y="60" width="200" height="160" class="card"/>
    <g transform="translate(28,92)">
      <rect x="0" y="36" width="15" height="76" fill="#bfdbfe" stroke="#2563eb"/><rect x="22" y="26" width="17" height="96" fill="#93c5fd" stroke="#2563eb"/><rect x="48" y="38" width="18" height="72" fill="#bfdbfe" stroke="#2563eb"/><rect x="78" y="52" width="20" height="44" fill="#93c5fd" stroke="#2563eb"/>
    </g>
    <text x="148" y="96" text-anchor="middle" class="small">14 x 14</text>
    <g transform="translate(114,112)" fill="#93c5fd" stroke="#fff">
      <rect x="0" y="0" width="14" height="14"/><rect x="18" y="0" width="14" height="14"/><rect x="36" y="0" width="14" height="14"/><rect x="54" y="0" width="14" height="14"/>
      <rect x="0" y="18" width="14" height="14"/><rect x="18" y="18" width="14" height="14"/><rect x="36" y="18" width="14" height="14"/><rect x="54" y="18" width="14" height="14"/>
      <rect x="0" y="36" width="14" height="14"/><rect x="18" y="36" width="14" height="14"/><rect x="36" y="36" width="14" height="14"/><rect x="54" y="36" width="14" height="14"/>
      <rect x="0" y="54" width="14" height="14"/><rect x="18" y="54" width="14" height="14"/><rect x="36" y="54" width="14" height="14"/><rect x="54" y="54" width="14" height="14"/>
    </g>
    <text x="100" y="203" text-anchor="middle" class="tiny">196 visual tokens 视觉令牌</text>
  </g>

  <g transform="translate(760,120)">
    <text x="170" y="10" text-anchor="middle" class="step">4. Transformer Decoder</text>
    <text x="170" y="36" text-anchor="middle" class="cn">Masked Self-Attention + Cross-Attention</text>
    <rect x="0" y="58" width="340" height="250" class="card blue"/>
    <rect x="20" y="82" width="300" height="88" class="card blue" filter="none"/>
    <text x="170" y="105" text-anchor="middle" class="small" font-weight="700">Masked Self-Attention 自注意力（掩码）</text>
    <g transform="translate(40,124)">
      <rect width="58" height="24" class="chip"/><text x="29" y="17" text-anchor="middle" class="tiny">&lt;START&gt;</text>
      <rect x="68" width="34" height="24" class="chip"/><text x="85" y="17" text-anchor="middle" class="tiny">an</text>
      <rect x="112" width="70" height="24" class="chip"/><text x="147" y="17" text-anchor="middle" class="tiny">airplane</text>
      <rect x="192" width="26" height="24" class="chip"/><text x="205" y="17" text-anchor="middle" class="tiny">is</text>
    </g>
    <g transform="translate(84,150)" fill="#93c5fd" stroke="#fff">
      <rect x="0" y="55" width="18" height="18"/><rect x="22" y="38" width="18" height="35"/><rect x="44" y="20" width="18" height="53"/><rect x="66" y="0" width="18" height="73"/><rect x="88" y="20" width="18" height="53"/><rect x="110" y="38" width="18" height="35"/>
    </g>
    <rect x="20" y="184" width="300" height="100" class="card green" filter="none"/>
    <text x="170" y="208" text-anchor="middle" class="small" font-weight="700">Cross-Attention 交叉注意力</text>
    <g transform="translate(54,232)">
      <rect width="22" height="22" class="region"/><rect x="32" width="22" height="22" class="region"/><rect x="64" width="22" height="22" class="region"/><rect x="96" width="22" height="22" class="region"/><rect x="128" width="22" height="22" class="region"/><rect x="160" width="22" height="22" class="region"/><rect x="192" width="22" height="22" class="region"/>
    </g>
    <text x="170" y="274" text-anchor="middle" class="tiny">Image Region Tokens (196)</text>
  </g>

  <g transform="translate(1160,130)">
    <text x="120" y="0" text-anchor="middle" class="step">5. Word-by-word</text>
    <text x="120" y="26" text-anchor="middle" class="step">Generation</text>
    <text x="120" y="52" text-anchor="middle" class="cn">逐词生成</text>
    <rect x="0" y="72" width="240" height="150" class="card"/>
    <text x="26" y="104" class="tiny">&lt;START&gt;</text>
    <text x="26" y="138" class="tiny">&lt;START&gt;  an</text>
    <text x="26" y="172" class="tiny">&lt;START&gt;  an  airplane</text>
    <text x="26" y="206" class="tiny">&lt;START&gt;  an  airplane  is ... &lt;END&gt;</text>
    <path d="M18 110 L18 128 M18 144 L18 162 M18 178 L18 196" class="dash"/>
  </g>

  <g transform="translate(1440,130)">
    <text x="72" y="0" text-anchor="middle" class="step">6. Final Caption</text>
    <text x="72" y="26" text-anchor="middle" class="cn">输出描述</text>
    <path d="M0 86 Q0 64 22 64 H138 Q160 64 160 86 V158 Q160 180 138 180 H88 L58 214 L62 180 H22 Q0 180 0 158 Z" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
    <text x="80" y="115" text-anchor="middle" class="small" font-weight="700">an airplane is</text>
    <text x="80" y="145" text-anchor="middle" class="small" font-weight="700">parked on a runway</text>
  </g>

  <path d="M225 330 H265" class="arrow"/><path d="M460 330 H500" class="arrow"/><path d="M712 330 H752" class="arrow"/><path d="M1104 330 H1152" class="arrow"/><path d="M1404 330 H1432" class="arrow"/>

  <rect x="155" y="500" width="1290" height="72" class="card"/>
  <text x="255" y="530" class="small" font-weight="700">Encoder extracts regional visual features.</text><text x="255" y="552" class="cn">编码器提取图像区域特征。</text>
  <text x="610" y="530" class="small" font-weight="700">Self-attention models word relationships.</text><text x="610" y="552" class="cn">自注意力建模词语关系。</text>
  <text x="975" y="530" class="small" font-weight="700">Cross-attention aligns image and text.</text><text x="975" y="552" class="cn">交叉注意力对齐图文区域。</text>
  <text x="1265" y="530" class="small" font-weight="700">Autoregressive decoding until &lt;END&gt;.</text><text x="1265" y="552" class="cn">逐词生成直到结束。</text>
  <line x1="535" y1="512" x2="535" y2="560" stroke="#cbd5e1"/><line x1="900" y1="512" x2="900" y2="560" stroke="#cbd5e1"/><line x1="1205" y1="512" x2="1205" y2="560" stroke="#cbd5e1"/>

  <g transform="translate(35,640)">
    <rect width="270" height="165" class="card"/><text x="135" y="30" text-anchor="middle" class="step">A) MSCOCO Subset</text><text x="135" y="55" text-anchor="middle" class="cn">图像-描述对</text>
    <rect x="28" y="76" width="80" height="56" class="token"/><text x="128" y="90" class="tiny">an airplane is parked</text><text x="128" y="113" class="tiny">A group of people</text><text x="128" y="136" class="tiny">A cat sitting on a bed</text>
  </g>
  <g transform="translate(350,640)">
    <rect width="270" height="165" class="card"/><text x="135" y="30" text-anchor="middle" class="step">B) Vocabulary</text><text x="135" y="55" text-anchor="middle" class="cn">词表与分词器</text>
    <rect x="28" y="76" width="90" height="26" class="amber"/><text x="73" y="94" text-anchor="middle" class="tiny">&lt;START&gt;</text><rect x="28" y="112" width="90" height="26" class="amber"/><text x="73" y="130" text-anchor="middle" class="tiny">&lt;END&gt;</text><text x="145" y="102" class="tiny">an airplane is</text><text x="145" y="128" class="tiny">['an', 'airplane']</text>
  </g>
  <g transform="translate(665,640)">
    <rect width="270" height="165" class="card"/><text x="135" y="30" text-anchor="middle" class="step">C) Training</text><text x="135" y="55" text-anchor="middle" class="cn">训练</text>
    <rect x="28" y="78" width="214" height="38" class="chip"/><text x="135" y="102" text-anchor="middle" class="small">Teacher Forcing</text><rect x="28" y="126" width="214" height="28" class="chip"/><text x="135" y="145" text-anchor="middle" class="tiny">Loss: CrossEntropyLoss</text>
  </g>
  <g transform="translate(980,640)">
    <rect width="240" height="165" class="card"/><text x="120" y="30" text-anchor="middle" class="step">D) Checkpoint</text><text x="120" y="55" text-anchor="middle" class="cn">模型权重</text>
    <path d="M88 78 H142 L158 94 V138 H88 Z" fill="#2563eb"/><rect x="102" y="90" width="42" height="25" fill="#e0f2fe"/><rect x="102" y="126" width="55" height="15" fill="#fff"/><text x="120" y="154" text-anchor="middle" class="tiny">best_model.pth</text>
  </g>
  <g transform="translate(1265,640)">
    <rect width="300" height="165" class="card"/><text x="150" y="30" text-anchor="middle" class="step">E) Streamlit Demo</text><text x="150" y="55" text-anchor="middle" class="cn">前端展示</text>
    <rect x="34" y="72" width="232" height="82" fill="#f8fafc" stroke="#94a3b8" rx="7"/><text x="60" y="104" class="tiny">Upload Image</text><rect x="58" y="116" width="70" height="26" class="token"/><text x="160" y="104" class="tiny">Generated Caption</text><rect x="156" y="116" width="92" height="26" class="region"/><text x="202" y="134" text-anchor="middle" class="tiny">caption</text>
  </g>

  <path d="M305 722 H342" class="arrow"/><path d="M620 722 H657" class="arrow"/><path d="M935 722 H972" class="arrow"/><path d="M1220 722 H1256" class="arrow"/>
  <path d="M240 580 V630" class="dash"/><path d="M500 580 V630" class="dash"/><path d="M800 580 V630" class="dash"/><path d="M1100 580 V630" class="dash"/><path d="M1400 580 V630" class="dash"/>
  <text x="635" y="855" class="tiny">Data / Information Flow 数据 / 信息流</text><line x1="500" y1="850" x2="620" y2="850" class="arrow"/>
  <text x="1000" y="855" class="tiny">Training Support Flow 训练支持流</text><line x1="850" y1="850" x2="970" y2="850" class="dash"/>
</svg>
